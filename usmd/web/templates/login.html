<!doctype html>
<html lang="fr" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Connexion au tableau de bord USMD-RDSH">
  <meta name="keywords" content="USMD, RDSH, connexion, login">
  <title>USMD-RDSH — Connexion</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #0d1117; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card {
      width: 360px;
      background: #161b22;
      border: 1px solid #1e2938;
      border-radius: 10px;
      padding: 2rem 2rem 1.75rem;
    }
    .brand-name { color: #00d4ff; font-size: 1rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    .brand-icon { font-size: 2rem; color: #00d4ff; }
    .form-control { background: #0d1117; border-color: #30363d; color: #e6edf3; }
    .form-control:focus { background: #0d1117; border-color: #00d4ff; box-shadow: 0 0 0 2px rgba(0,212,255,.15); color: #e6edf3; }
    .btn-login { background: #00d4ff; border: none; color: #0d1117; font-weight: 600; }
    .btn-login:hover { background: #00bbde; color: #0d1117; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="text-center mb-4">
    <i class="bi bi-cpu brand-icon"></i>
    <div class="brand-name mt-2">USMD-RDSH</div>
    <div class="text-muted small mt-1">Tableau de bord de supervision</div>
  </div>

  {% if error %}
  <div class="alert alert-danger py-2 small mb-3" role="alert">
    <i class="bi bi-exclamation-triangle-fill me-1"></i> {{ error }}
  </div>
  {% endif %}

  <form method="post" action="{% url 'login' %}">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label small text-muted" for="username">Identifiant</label>
      <div class="input-group">
        <span class="input-group-text bg-dark border-secondary">
          <i class="bi bi-person-fill text-muted"></i>
        </span>
        <input type="text" class="form-control" id="username" name="username"
               placeholder="admin" autocomplete="username" required autofocus>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label small text-muted" for="password">Mot de passe</label>
      <div class="input-group">
        <span class="input-group-text bg-dark border-secondary">
          <i class="bi bi-lock-fill text-muted"></i>
        </span>
        <input type="password" class="form-control" id="password" name="password"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>
    </div>
    <button type="submit" class="btn btn-login w-100">
      <i class="bi bi-box-arrow-in-right me-1"></i> Connexion
    </button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
