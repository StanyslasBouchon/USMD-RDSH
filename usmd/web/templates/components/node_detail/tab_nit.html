{# Context: nit #}
<div class="tab-pane fade" id="tab-nit">
  <div class="node-card">
    <p id="nit-last-update" class="text-muted small table-meta-label px-1 mb-2"></p>
    <table id="nit-table" class="table table-sm table-striped mb-0{% if not nit %} d-none{% endif %}">
      <thead>
        <tr>
          <th>Adresse</th>
          <th>Clé publique</th>
          <th>TTL restant</th>
          <th>État</th>
        </tr>
      </thead>
      <tbody id="nit-tbody">
        {% for entry in nit %}
        <tr{% if entry.expired %} class="table-danger"{% endif %}>
          <td class="text-light">
            <a href="{% url 'node_detail' entry.address %}" class="text-info text-decoration-none">
              <i class="bi bi-hdd-network me-1"></i>{{ entry.address }}
            </a>
          </td>
          <td>
            <a href="{% url 'node_detail' entry.address %}" class="text-decoration-none">
              <code class="text-info code-key">{{ entry.pub_key }}</code>
            </a>
          </td>
          <td>
            <span class="{% if entry.expired %}text-danger{% elif entry.ttl_remaining < 30 %}text-warning{% else %}text-success{% endif %}">
              {{ entry.ttl_remaining }}s
            </span>
          </td>
          <td>
            {% if entry.expired %}
              <span class="badge badge-state-inactive">Expiré</span>
            {% else %}
              <span class="badge badge-state-active">Valide</span>
            {% endif %}
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    <div id="nit-empty" class="p-3 text-muted small{% if nit %} d-none{% endif %}">
      <i class="bi bi-info-circle me-1"></i>NIT vide.
    </div>
  </div>
</div>
