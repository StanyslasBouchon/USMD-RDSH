<script>
const evtSource = new EventSource("{% url 'api_stream' %}");

evtSource.onmessage = function(e) {
  const data = JSON.parse(e.data);
  if (data.error) return;

  const nodes = data.nodes;
  document.getElementById('node-count').textContent =
    nodes.length + (nodes.length === 1 ? ' node' : ' nodes');

  const STATE_REASONS = {
    'inactive':                                  'Inactive',
    'inactive_timeout':                          'NCP timeout exceeded',
    'inactive_nndp_no_here_i_am':                'No HIA received',
    'inactive_mutating':                         'Mutating',
    'inactive_emergency':                        'Emergency',
    'inactive_emergency_out_of_resources':       'Insufficient resources',
    'inactive_emergency_dependency_inactive':    'Inactive dependency',
    'inactive_emergency_health_check_failed':    'Health check failed',
    'inactive_emergency_update_failed':          'Update failed',
    'excluded_invalid_nit':                      'Invalid NIT (excluded)',
    'excluded_invalid_endorsement':              'Invalid endorsement (excluded)',
    'excluded_unverifiable_endorsement':         'Unverifiable endorsement (excluded)',
    'excluded_invalid_revocation':               'Invalid revocation (excluded)',
    'excluded_invalid_endorsement_revocation':   'Invalid endorsement revocation (excluded)',
  };

  nodes.forEach(function(node) {
    const addr = node.node?.address;
    if (!addr) return;

    const card = document.querySelector(`[data-address="${addr}"]`);
    if (!card) {
      location.reload();
      return;
    }

    const state = node.node?.state || '';
    const reason = node.node?.state_reason || STATE_REASONS[state] || '';
    const badge = card.querySelector('.node-state-badge');
    if (badge && badge.dataset.state !== state) {
      badge.dataset.state = state;
      if (state === 'active') {
        badge.className = 'badge badge-state-active node-state-badge';
        badge.innerHTML = '<i class="bi bi-check-circle-fill me-1"></i>ACTIVE';
      } else if (state.includes('inactive') || state.includes('timeout')) {
        badge.className = 'badge badge-state-inactive node-state-badge';
        badge.innerHTML = '<i class="bi bi-dash-circle-fill me-1"></i>INACTIVE';
      } else if (state.includes('pending')) {
        badge.className = 'badge badge-state-pending node-state-badge';
        badge.innerHTML = '<i class="bi bi-hourglass-split me-1"></i>PENDING';
      } else if (state.includes('exclud')) {
        badge.className = 'badge badge-state-excluded node-state-badge';
        badge.innerHTML = '<i class="bi bi-x-circle-fill me-1"></i>EXCLUDED';
      } else {
        badge.className = 'badge badge-state-default node-state-badge';
        badge.textContent = state;
      }
      let reasonEl = card.querySelector('.node-state-reason');
      if (state.includes('inactive') || state.includes('timeout')) {
        if (!reasonEl) {
          reasonEl = document.createElement('div');
          reasonEl.className = 'inactive-reason node-state-reason';
          badge.insertAdjacentElement('afterend', reasonEl);
        }
        reasonEl.textContent = reason;
      } else if (reasonEl) {
        reasonEl.remove();
      }
    }

    const r = node.resources;
    const pct = v => (v * 100).toFixed(1) + '%';
    const width = v => (Math.min(100, Math.max(0, v * 100)).toFixed(1)) + '%';

    card.querySelector('.res-val-cpu').textContent  = pct(r.cpu_percent);
    card.querySelector('.res-val-ram').textContent  = pct(r.ram_percent);
    card.querySelector('.res-val-disk').textContent = pct(r.disk_percent);
    card.querySelector('.res-val-net').textContent  = pct(r.network_percent);

    card.querySelector('.res-bar-cpu').style.width  = width(r.cpu_percent);
    card.querySelector('.res-bar-ram').style.width  = width(r.ram_percent);
    card.querySelector('.res-bar-disk').style.width = width(r.disk_percent);
    card.querySelector('.res-bar-net').style.width  = width(r.network_percent);

    const uptime = card.querySelector('.text-muted.small');
    if (uptime && node.node.uptime_seconds !== undefined) {
      const s = Math.floor(node.node.uptime_seconds);
      const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
      const uptimeStr = h ? `${h}h ${m}m ${sec}s` : m ? `${m}m ${sec}s` : `${sec}s`;
      const t = uptime.querySelector('i[class*="bi-clock"]');
      if (t && t.nextSibling) t.nextSibling.textContent = ' uptime ' + uptimeStr;
    }
  });

  const promotions = data.promotions || [];
  document.getElementById('promo-count').textContent =
    promotions.length + (promotions.length === 1 ? ' entry' : ' entries');

  const section = document.getElementById('promo-section');
  if (section) {
    if (promotions.length === 0) {
      section.innerHTML =
        '<div class="alert alert-secondary text-muted small" id="promo-empty">' +
        '<i class="bi bi-info-circle me-2"></i>No quorum promotions recorded.' +
        '</div>';
    } else {
      let rows = '';
      promotions.forEach(function(p) {
        const roleBadge = p.role_name === 'node_operator'
          ? `<span class="badge bg-warning text-dark">node_operator</span>`
          : p.role_name === 'usd_operator'
            ? `<span class="badge bg-info text-dark">usd_operator</span>`
            : p.role_name === 'ucd_operator'
              ? `<span class="badge bg-primary">ucd_operator</span>`
              : `<span class="badge bg-secondary">${p.role_name || '—'}</span>`;
        rows += `<tr>
          <td><span class="badge bg-secondary">#${p.epoch}</span></td>
          <td>${roleBadge}</td>
          <td><i class="bi bi-hdd-network me-1 text-warning"></i><a href="/node/${p.address}" class="text-warning text-decoration-none fw-semibold">${p.address}</a></td>
          <td><a href="/node/${p.address}" class="text-decoration-none"><code class="code-key-sm text-muted">${p.pub_key}</code></a></td>
          <td class="text-muted small">${p.promoted_at_str}</td>
          <td class="small">${p.reason}</td>
        </tr>`;
      });
      section.innerHTML =
        '<div class="table-responsive"><table class="table table-sm table-hover align-middle" id="promo-table">' +
        '<thead><tr>' +
        '<th>Epoch</th><th>Elected role</th><th>Promoted node</th><th>Public key</th><th>Timestamp</th><th>Reason</th>' +
        '</tr></thead><tbody>' + rows + '</tbody></table></div>';
    }
  }
};

evtSource.onerror = function() {
  console.warn("USMD SSE connection lost, reconnecting…");
};
</script>
